<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --text: #e8e8e0;
    --muted: #555550;
    --accent: #c8f060;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    cursor: crosshair;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 120px;
    height: 1px;
    background: var(--accent);
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.4rem, 8vw, 5rem);
    line-height: 0.9;
    letter-spacing: -0.03em;
  }

  .header-left h1 span { color: var(--accent); }

  .header-meta {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.8;
  }

  .filter-bar {
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 0.65rem;
    color: var(--muted);
    margin-right: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 0.3rem 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .filter-btn:hover, .filter-btn.active {
    color: var(--cat-color, var(--accent));
    border-color: var(--cat-color, var(--accent));
    background: rgba(255,255,255,0.03);
  }

  .grid {
    padding: 2rem;
    columns: 1;
    gap: 1rem;
  }

  @media (min-width: 600px) { .grid { columns: 2; } }
  @media (min-width: 900px) { .grid { columns: 3; } }
  @media (min-width: 1200px) { .grid { columns: 4; } }

  .card {
    break-inside: avoid;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .card:hover { transform: translateY(-3px); border-color: var(--cat-color, var(--accent)); }
  .card.hidden { display: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card img, .card video { width: 100%; display: block; }

  .card-info {
    padding: 0.8rem 1rem;
    border-top: 1px solid var(--border);
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    margin-bottom: 0.2rem;
    color: var(--text);
  }

  .card-tag {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .type-badge {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    font-size: 0.55rem;
    padding: 0.2rem 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: 1px solid currentColor;
    background: rgba(0,0,0,0.6);
  }

  .play-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 44px;
    height: 44px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .play-icon::after {
    content: '';
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 7px 0 7px 14px;
    border-color: transparent transparent transparent var(--accent);
    margin-left: 3px;
  }

  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .lightbox.open { display: flex; }

  .lightbox-inner img,
  .lightbox-inner video {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    display: block;
  }

  .lightbox-close {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .lightbox-close:hover { border-color: var(--accent); color: var(--accent); }

  .lightbox-caption {
    margin-top: 1rem;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
  }

  footer {
    padding: 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer span { font-size: 0.65rem; color: var(--muted); }
  .count strong { font-family: 'Syne', sans-serif; color: var(--accent); }

  .empty {
    display: none;
    padding: 4rem 2rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Selected<br>Work<span>.</span></h1>
  </div>
  <div class="header-meta" id="headerMeta"></div>
</header>

<div class="filter-bar" id="filterBar">
  <span class="filter-label">Filter —</span>
</div>

<div class="grid" id="grid"></div>
<div class="empty" id="empty">No items in this category.</div>

<footer>
  <span>Selected Work</span>
  <span class="count"><strong id="visibleCount">0</strong> works</span>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">[ close ]</button>
  <div class="lightbox-inner" id="lightboxInner"></div>
</div>

<script>
// ============================================================
// CONFIG — only edit this section
// ============================================================
const CONFIG = {

  name: "Jonathan Lancaster",
  location: "San Francisco",

  categories: [
    { key: "3d",              label: "3D",              color: "#f060c8" },
    { key: "album-covers",    label: "Album Covers",    color: "#c8f060" },
    { key: "logos",           label: "Logos",           color: "#f0c860" },
    { key: "posters",         label: "Posters",         color: "#60c8f0" },
    { key: "interactive-art", label: "Interactive Art", color: "#c860f0" },
  ],

  // Add your works here.
  // - src: path to file relative to index.html
  // - type: must match a category key above
  // - title: display name
  // - video: true for video files (optional, default false)
  works: [

    // 3D
    { title: "Buddah Scene", src: "assets/3d/aframe-buddah.png",  type: "3d" },
    { title: "3d Primitive Animation 1", src: "assets/3d/dots1.mp4",  type: "3d" },
    { title: "3d Primitive Animation 2", src: "assets/3d/dots2.mp4",  type: "3d" },

    // Album Covers
    { title: "Quench - Dust To Lace", src: "assets/covers/dust-to-lace-cover-2.png", type: "album-covers" },
    { title: "Quench - Eyes On Me", src: "assets/covers/eyes-on-me-coverart.jpg", type: "album-covers" },
    { title: "MW - Blind Spot", src: "assets/covers/MW-BlindSpot-Cover.png", type: "album-covers" },
    { title: "Quench - New Attitude", src: "assets/covers/NewAttitude-Quench-FINAL.png", type: "album-covers" },
    { title: "Quench - No More", src: "assets/covers/quench-no-more-single-cover.jpg", type: "album-covers" },
    { title: "Quench - Sugar High", src: "assets/covers/sugar-high.png", type: "album-covers" },

    // Logos
    { title: "Stellr Audio", src: "assets/logos/stellr-logo-white.png", type: "logos" },

    // Posters
    { title: "Project Q", src: "assets/posters/projectq-april28-boomboom-flyer-print.png", type: "posters" },
    { title: "Quench Tour", src: "assets/posters/quench-tour-october-2019-clarify.png", type: "posters" },

    // Interactive Art
    { title: "Conductor Tracking 1", src: "assets/tech/posenet-wrist-tracking-colors.mp4", type: "interactive-art" },
    { title: "Conductor Tracking 2", src: "assets/tech/posenet-wrist-tracking-osc.mp4", type: "interactive-art" },
    { title: "Motion Detection", src: "assets/tech/vida-motion-detection.mp4", type: "interactive-art" },

  ]
};
// ============================================================
// END CONFIG
// ============================================================

// Header
document.getElementById('headerMeta').innerHTML =
  `2D &amp; 3D Design<br>${CONFIG.location}`;

// Category map
const catMap = {};
CONFIG.categories.forEach(c => catMap[c.key] = c);

// Filter buttons
const filterBar = document.getElementById('filterBar');

function makeBtn(label, filter, color) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (filter === 'all' ? ' active' : '');
  btn.dataset.filter = filter;
  btn.textContent = label;
  if (color) btn.style.setProperty('--cat-color', color);
  filterBar.appendChild(btn);
}

makeBtn('All', 'all', null);
CONFIG.categories.forEach(c => makeBtn(c.label, c.key, c.color));

// Cards
const grid = document.getElementById('grid');

CONFIG.works.forEach((work, i) => {
  const cat = catMap[work.type];
  if (!cat) { console.warn(`Unknown type: ${work.type}`); return; }

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.type = work.type;
  card.style.animationDelay = `${i * 0.04}s`;
  card.style.setProperty('--cat-color', cat.color);

  const media = document.createElement('div');
  media.style.position = 'relative';

  if (work.video) {
    const vid = document.createElement('video');
    vid.src = work.src;
    vid.muted = true;
    vid.loop = true;
    vid.playsInline = true;
    vid.preload = 'metadata';
    media.appendChild(vid);
    const play = document.createElement('div');
    play.className = 'play-icon';
    media.appendChild(play);
  } else {
    const img = document.createElement('img');
    img.src = work.src;
    img.alt = work.title;
    img.loading = 'lazy';
    media.appendChild(img);
  }

  const badge = document.createElement('span');
  badge.className = 'type-badge';
  badge.textContent = cat.label;
  badge.style.color = cat.color;
  media.appendChild(badge);

  const info = document.createElement('div');
  info.className = 'card-info';
  info.innerHTML = `
    <div class="card-title">${work.title}</div>
    <div class="card-tag" style="color:${cat.color}">${cat.label}</div>
  `;

  card.appendChild(media);
  card.appendChild(info);
  grid.appendChild(card);
});

// Filter
const countEl = document.getElementById('visibleCount');
const emptyEl = document.getElementById('empty');

function updateCount() {
  const n = document.querySelectorAll('.card:not(.hidden)').length;
  countEl.textContent = n;
  emptyEl.style.display = n === 0 ? 'block' : 'none';
}

filterBar.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filter = btn.dataset.filter;
  document.querySelectorAll('.card').forEach(card => {
    card.classList.toggle('hidden', filter !== 'all' && card.dataset.type !== filter);
  });
  updateCount();
});

// Lightbox
const lightbox = document.getElementById('lightbox');
const lightboxInner = document.getElementById('lightboxInner');

grid.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const img = card.querySelector('img');
  const video = card.querySelector('video');
  const title = card.querySelector('.card-title')?.textContent || '';
  lightboxInner.innerHTML = '';

  let el;
  if (img) {
    el = document.createElement('img');
    el.src = img.src;
  } else if (video) {
    el = document.createElement('video');
    el.src = video.src;
    el.controls = true;
    el.autoplay = true;
  } else return;

  lightboxInner.appendChild(el);

  if (title) {
    const cap = document.createElement('div');
    cap.className = 'lightbox-caption';
    cap.textContent = title;
    lightboxInner.appendChild(cap);
  }

  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
});

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  const v = lightboxInner.querySelector('video');
  if (v) v.pause();
  lightboxInner.innerHTML = '';
}

document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// Video hover preview
grid.querySelectorAll('.card video').forEach(video => {
  const card = video.closest('.card');
  card.addEventListener('mouseenter', () => video.play().catch(() => {}));
  card.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
});

updateCount();
</script>
</body>
</html>
